name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Run the full test suite natively (fast feedback, readable output)
  # -----------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Run test suite
        run: python -m pytest tests/ -x -q --tb=short
        env:
          # Credential-gated MCP integration tests auto-skip when vars absent.
          # No secrets needed for the core 768-test suite.
          PYTHONDONTWRITEBYTECODE: "1"

  # -----------------------------------------------------------------------
  # Job 2: Verify Docker images build and the suite passes inside container
  # -----------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t sentient-ledger:ci .

      - name: Build test image and run suite in container
        run: |
          docker build -f Dockerfile.test -t sentient-ledger:test .
          docker run --rm sentient-ledger:test

  # -----------------------------------------------------------------------
  # Job 3: Push to ghcr.io — only on push to main after both jobs pass
  # -----------------------------------------------------------------------
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/sentient-ledger
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
